services:
  mysql:
    image: mysql:8.0
    container_name: capstone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_NAME:-jihodb}
      MYSQL_USER: ${DB_USER:-jiho}
      MYSQL_PASSWORD: ${DB_PASSWORD:-qwer1234}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: capstone-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
     #  GPU 사용 시 아래 주석 해제 (Docker Desktop + NVIDIA Container Toolkit 필요)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    container_name: capstone-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      # Docker 내부 네트워크 호스트명으로 덮어쓰기
      DB_HOST: mysql
      LLM_HOST: http://ollama:11434
    volumes:
      # MediaPipe 모델 (빌드 캐시 방지용 마운트)
      - ./models:/app/models
    # 웹캠 연결 시 아래 주석 해제 (usbipd-win으로 패스스루 후 /dev/video0 확인 필요)
    devices:
     - /dev/video0:/dev/video0

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: capstone-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    ports:
      - "8000:8000"

volumes:
  mysql_data:
  ollama_data:
