services:
  mysql:
    image: mysql:8.0
    container_name: capstone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_NAME:-jihodb}
      MYSQL_USER: ${DB_USER:-jiho}
      MYSQL_PASSWORD: ${DB_PASSWORD:-qwer1234}
      TZ: Asia/Seoul
    ports:
      # 호스트측 3307 → 컨테이너 3306. Windows 로컬 MySQL이 3306을 점유하는 경우 회피용.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: capstone-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 사용 시 아래 주석 해제 (Docker Desktop + NVIDIA Container Toolkit 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # 기본 실행에서는 제외 (profile 지정 시에만 기동).
  # WSL 호스트에서 `python main.py`로 직접 실행하는 것이 기본 권장 방식.
  # Docker 내부에서 돌리려면: `docker compose --profile app-in-docker up -d app`
  app:
    build: .
    container_name: capstone-app
    restart: unless-stopped
    profiles:
      - app-in-docker
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      LLM_HOST: http://ollama:11434
    volumes:
      - ./models:/app/models
    group_add:
      - video
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: capstone-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    ports:
      - "8000:8000"

volumes:
  mysql_data:
  ollama_data:
