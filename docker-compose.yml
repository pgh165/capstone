services:
  mysql:
    image: mysql:8.0
    container_name: capstone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_NAME:-jihodb}
      MYSQL_USER: ${DB_USER:-jiho}
      MYSQL_PASSWORD: ${DB_PASSWORD:-qwer1234}
      TZ: Asia/Seoul
    ports:
      # 호스트측 3307 → 컨테이너 3306. Windows 로컬 MySQL이 3306을 점유하는 경우 회피용.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: capstone-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro

volumes:
  mysql_data:
