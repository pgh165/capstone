<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시스템 블록도 — AI 포모도로 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090f;--surface:#10131c;--card:#161a28;--border:#1e2235;
  --text:#dde1f0;--muted:#484d6a;
  --blue:#5c8dff;--green:#43c464;--yellow:#f5c842;
  --orange:#ff7043;--red:#f44336;--purple:#b06ef3;--cyan:#26c6da;
  --teal:#26a69a;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;overflow:hidden}

/* ── 레이아웃 ── */
#stage{width:100vw;height:100vh;position:relative}
svg#diagram{width:100%;height:100%;position:absolute;inset:0}

/* ── 상단 헤더 ── */
#hdr{position:fixed;top:0;left:0;right:0;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,9,15,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);z-index:50}
#hdr h1{font-size:.95rem;font-weight:700;letter-spacing:.02em}
#hdr .sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);
  padding:5px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;
  transition:background .15s,color .15s}
.hdr-btn:hover{background:var(--border);color:var(--text)}
.hdr-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── 범례 ── */
#legend{position:fixed;bottom:20px;left:20px;
  background:rgba(16,19,28,.9);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:10px;padding:12px 16px;
  font-size:.72rem;z-index:50;display:flex;flex-direction:column;gap:6px}
.leg-row{display:flex;align-items:center;gap:8px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-line{width:24px;height:2px;flex-shrink:0}

/* ── 노드 스타일 ── */
.node-rect{rx:9;ry:9}
.node-lbl{font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:500;
  dominant-baseline:middle;text-anchor:middle;fill:var(--text);pointer-events:none}
.node-sub{font-family:'JetBrains Mono',monospace;font-size:8.5px;fill:#6b718a;
  dominant-baseline:middle;text-anchor:middle;pointer-events:none}
.node-icon{font-size:16px;dominant-baseline:middle;text-anchor:middle;pointer-events:none}

/* 노드 애니메이션 */
.node-g{opacity:0;transition:opacity .4s ease,transform .4s ease}
.node-g.visible{opacity:1}

/* ── 화살표 ── */
.edge{stroke-width:1.8;fill:none;opacity:0;transition:opacity .5s}
.edge.visible{opacity:1}

/* ── 데이터 흐름 파티클 ── */
.particle{r:3.5;opacity:0}

/* ── 강조 펄스 ── */
@keyframes node-pulse{
  0%{filter:drop-shadow(0 0 0px currentColor)}
  50%{filter:drop-shadow(0 0 8px currentColor)}
  100%{filter:drop-shadow(0 0 0px currentColor)}
}
.pulsing{animation:node-pulse 2s ease-in-out infinite}

/* 재생 컨트롤 */
#replay{position:fixed;bottom:20px;right:20px;
  background:var(--blue);border:none;color:#fff;
  padding:8px 18px;border-radius:8px;font-size:.8rem;cursor:pointer;z-index:50;
  font-family:'Noto Sans KR',sans-serif;transition:opacity .2s}
#replay:hover{opacity:.85}
</style>
</head>

  <div class="leg-row"><div class="leg-line" style="background:#5c8dff"></div><span>입력 / 점수 산출</span></div>
  <div class="leg-row"><div class="leg-line" style="background:#43c464"></div><span>생체 신호 분석</span></div>
  <div class="leg-row"><div class="leg-line" style="background:#b06ef3"></div><span>AI 판정 / LLM 코칭</span></div>

</div>

<button id="replay">↺ 다시 재생</button>

<script>
// 노드 등장 순서 및 딜레이
const sequence = [
  {id:'n-cam',  delay:200},
  {id:'n-ffm',  delay:500},
  {id:'n-mp',   delay:800},
  {id:'n-dt',   delay:1200},
  {id:'n-hp',   delay:1500},
  {id:'n-dj',   delay:1900},
  {id:'n-ai',   delay:2400},
  {id:'n-fm',   delay:2900},
  {id:'n-ac',   delay:3300},
  {id:'n-pt',   delay:3700},
  {id:'n-lc',   delay:4100},
  {id:'n-tts',  delay:4500},
  {id:'n-db',   delay:4900},
  {id:'n-web',  delay:5300},
];

// 엣지 등장 순서
const edgeSeq = [
  {id:'e-cam-ffm', delay:350},
  {id:'e-ffm-mp',  delay:650},
  {id:'e-mp-dt',   delay:1050},
  {id:'e-mp-hp',   delay:1300},
  {id:'e-dt-dj',   delay:1700},
  {id:'e-hp-dj',   delay:1800},
  {id:'e-dj-ai',   delay:2200},
  {id:'e-ai-dj',   delay:2500},
  {id:'e-dj-fm',   delay:2700},
  {id:'e-dj-ac',   delay:3100},
  {id:'e-fm-pt',   delay:3500},
  {id:'e-dj-pt',   delay:3600},
  {id:'e-pt-lc',   delay:3900},
  {id:'e-pt-ac',   delay:4000},
  {id:'e-ac-tts',  delay:4300},
  {id:'e-lc-tts',  delay:4700},
  {id:'e-fm-db',   delay:4750},
  {id:'e-dj-db',   delay:4800},
  {id:'e-db-web',  delay:5100},
];

let timers = [];

function clearAll(){
  timers.forEach(clearTimeout);
  timers = [];
  document.querySelectorAll('.node-g').forEach(el=>{
    el.classList.remove('visible','pulsing');
  });
  document.querySelectorAll('.edge').forEach(el=>{
    el.classList.remove('visible');
  });
}

function play(){
  clearAll();
  sequence.forEach(({id,delay})=>{
    const t = setTimeout(()=>{
      const el = document.getElementById(id);
      if(el) el.classList.add('visible');
    }, delay);
    timers.push(t);
  });
  edgeSeq.forEach(({id,delay})=>{
    const t = setTimeout(()=>{
      const el = document.getElementById(id);
      if(el) el.classList.add('visible');
    }, delay);
    timers.push(t);
  });
  // 핵심 노드 펄스
  const t = setTimeout(()=>{
    document.getElementById('n-dj').classList.add('pulsing');
    document.getElementById('n-pt').classList.add('pulsing');
  }, 5600);
  timers.push(t);
}

document.getElementById('replay').addEventListener('click', play);

// 노드 클릭 정보
const nodeInfo = {
  'n-cam':  '📷 USB 웹캠 — /dev/video0 · usbipd로 WSL2에 연결',
  'n-ffm':  '⚙ ffmpeg subprocess — BGR 프레임 캡처, 해상도/FPS 조정',
  'n-mp':   '🧠 MediaPipe FaceMesh — 468개 3D 랜드마크 실시간 추출',
  'n-dt':   '👁 DrowsinessTracker — PERCLOS(60초 슬라이딩), MAR(3분 슬라이딩), 워밍업 20초',
  'n-hp':   '🙆 HeadPoseEstimator — solvePnP로 Pitch/Roll 추정. Yaw는 졸음 징후 아님 → 제외',
  'n-dj':   '📊 DrowsinessJudge — W1=0.45/W2=0.30/W3=0.25 가중합 → x²/100 제곱 변환 → EMA α=0.15 스무딩',
  'n-ai':   '🤖 AIJudge — gemma4:e4b, 5초 비동기. rule_score 앵커(±25). 편차>30 → 중간값',
  'n-fm':   '📈 FatigueManager — 피로도=연속작업×0.40+졸음빈도×0.60. RecoveryProfile로 개인화 추천',
  'n-ac':   '⚠ AlertController — L0~L3. 히스테리시스: 상승 즉시, 하강은 임계값 통과 후',
  'n-pt':   '🍅 PomodoroTimer — AI가 피로도+졸음으로 작업시간 10~40분, 휴식 5~30분 동적 결정',
  'n-lc':   '💬 LLMCoach — gemma4:26b, 5분 쿨다운. 개인 피로 원인 분석 후 코칭 메시지',
  'n-tts':  '🔊 TTS Voice — edge-tts ko-KR-InJoonNeural. 경보·코칭 음성 발화',
  'n-db':   '🗄 DBWriter — MySQL 8.0 (Docker :3307). detection_logs/fatigue_logs/recovery_actions',
  'n-web':  '🌐 Django 대시보드 (Docker :8000) — / · /realtime/ · /settings/',
};

// 툴팁
const tooltip = document.createElement('div');
tooltip.style.cssText = 'position:fixed;background:rgba(16,19,28,.95);border:1px solid #1e2235;'+
  'color:#dde1f0;padding:10px 14px;border-radius:8px;font-size:.78rem;max-width:320px;'+
  'line-height:1.6;pointer-events:none;z-index:200;display:none;font-family:Noto Sans KR,sans-serif';
document.body.appendChild(tooltip);

document.querySelectorAll('.node-g').forEach(el=>{
  el.style.cursor='pointer';
  el.addEventListener('mouseenter', e=>{
    const info = nodeInfo[el.id];
    if(!info) return;
    tooltip.textContent = info;
    tooltip.style.display = 'block';
  });
  el.addEventListener('mousemove', e=>{
    tooltip.style.left = (e.clientX+14)+'px';
    tooltip.style.top  = (e.clientY-10)+'px';
  });
  el.addEventListener('mouseleave', ()=>{ tooltip.style.display='none'; });
});

// 자동 시작
play();
</script>
